# --- SERVER CONFIG ---
server.port=87
spring.application.name=pro-dashboard-api

# --- STATIC CONTENT CONFIG ---
# This ensures that when you go to http://localhost:8080, 
# Spring looks in the 'static' folder (where Maven moved your React build)
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# --- LOGGING (Professional Touch) ---
# This makes your console output clean and helpful for debugging
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# --- JSON CONFIG ---
# Ensures dates and numbers look professional in your API responses
spring.jackson.serialization.indent_output=true
